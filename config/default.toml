bank_code = "BBL"

[server]
host = "0.0.0.0"
port = 8080
graphql_endpoint = "/graphql"
graphql_playground = true

[server.rate_limit]
requests_per_second = 10000
burst = 2000
per_ip_limit = 100

[network]
quic_port = 4433
tcp_port = 8443
quic_timeout_ms = 500
fallback_enabled = true
peers = []

[network.load_balancer]
strategy = "round_robin"

[blockchain]
endpoint = "http://127.0.0.1:9933"
timeout_secs = 5
max_retries = 3

[crypto]
hsm_enabled = false
hsm_library_path = ""
hsm_slot = 0
hsm_pin = ""
signing_algorithm = "ED25519"
encryption_algorithm = "AES-256-GCM"

[logging]
level = "info"
format = "json"
directory = "/var/log/ndid"

[redis]
enabled = false
url = "redis://127.0.0.1:6379/"
ttl_secs = 300
timeout_ms = 200
